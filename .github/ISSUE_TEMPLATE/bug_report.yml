name: Bug Report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug. What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps to trigger the bug.
      placeholder: |
        1. Create a team with team_create
        2. Spawn a teammate with ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or errors
      description: Paste any error messages, toast notifications, or tool output.
      render: shell

  - type: input
    id: version
    attributes:
      label: Plugin version
      placeholder: "0.5.0"
    validations:
      required: true

  - type: input
    id: opencode-version
    attributes:
      label: OpenCode version
      placeholder: "1.2.27"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Linux
        - Windows (WSL)
        - Other
    validations:
      required: true
